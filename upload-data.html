.btn:disabled { opacity:.5; cursor:default; }
.status { margin-top:16px; font-size:.9rem; color:#25d366; min-height:24px; }
.progress { width:100%; height:8px; background:rgba(255,255,255,.1); border-radius:4px; margin-top:12px; overflow:hidden; }

  ],

  extras: []

async function uploadAll() {
  const btn = document.getElementById('uploadBtn');
  const status = document.getElementById('status');
  const bar = document.getElementById('bar');
  btn.disabled = true;

  const sections = Object.keys(menuData).filter(k => menuData[k].length > 0);
  let done = 0;

  for (const sec of sections) {
    status.textContent = `⏳ جاري رفع ${sec}...`;
    // Clear section first
    await db.ref('menu/' + sec).remove();
    // Add each item
    for (const item of menuData[sec]) {
      await db.ref('menu/' + sec).push(item);
    }
    done++;
    bar.style.width = (done / sections.length * 100) + '%';
  }

  status.textContent = '✅ تم رفع كل الأصناف بنجاح! دلوقتي افتح الأدمن هتلاقيهم كلهم!';
  bar.style.width = '100%';
  btn.textContent = '✅ تم!';
}
</script>
</body>
